<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güvenli Erişim - Vekaletname Bilgileri</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 450px; width: 100%; }
        h2 { color: #333; margin-bottom: 20px; }
        input[type="password"] { width: 85%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; text-align: center; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-size: 16px; width: 90%; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .hidden-content { display: none; }
        .info-box { background-color: #e9ecef; padding: 15px; border-radius: 8px; font-size: 15px; font-weight: bold; color: #495057; margin-top: 10px; word-break: break-all; text-align: left; white-space: pre-line; line-height: 1.6; }
        .error { color: #dc3545; margin-top: 10px; font-size: 14px; font-weight: bold; }
        .copy-btn { background-color: #28a745; width: 100%; padding: 12px; font-size: 16px; margin-top: 15px; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .copy-btn:hover { background-color: #218838; }
        .label { font-size: 13px; color: #666; margin-top: 15px; display: block; text-align: left; font-weight: bold;}
    </style>
</head>
<body>

<script>
    // ============================================================
    // 👇 SADECE AŞAĞIDAKİ İKİ ALANI KENDİNE GÖRE DEĞİŞTİR 👇
    // ============================================================
    
    const GERCEK_SIFRE = "253425"; // Sayfa giriş şifresi
    
    // Alttaki tırnakların arasına vekaletname metnini istediğin gibi satır satır yapıştır:
    const VEKALETNAME_METNI = `AV. KADİR KARAGÜL
T.C 22186822382
İstanbul 1. Bolu Barosu 
Sicil; 96037
Adres: Cevizli Mahallesi Enderun sokak No: 1  Kartal/İstanbul`;

    // ============================================================
</script>

<div class="container">
    <!-- Giriş Ekranı -->
    <div id="login-form">
        <h2>Güvenli Erişim</h2>
        <p style="color: #666; font-size: 14px;">Vekaletname bilgilerini görüntülemek için şifreyi giriniz.</p>
        <input type="password" id="password" placeholder="Şifre">
        <br>
        <button onclick="verifyPassword()">Giriş Yap</button>
        <p id="error-msg" class="error"></p>
    </div>

    <!-- Şifre Doğruysa Açılacak Panel -->
    <div id="secure-content" class="hidden-content">
        <h2>Vekaletname Bilgileri</h2>
        
        <span class="label">Kutunun İçindeki Bilgiler:</span>
        <div class="info-box" id="vekalet-text"></div>
        
        <button class="copy-btn" onclick="copyText()">Tüm Bilgileri Kopyala</button>
    </div>
</div>

<script>
    function verifyPassword() {
        const input = document.getElementById('password').value;
        if (input === GERCEK_SIFRE) {
            document.getElementById('vekalet-text').innerText = VEKALETNAME_METNI;
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('secure-content').style.display = 'block';
        } else {
            document.getElementById('error-msg').innerText = "Hatalı şifre girdiniz!";
        }
    }

    function copyText() {
        const text = document.getElementById('vekalet-text').innerText;
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(() => { alert("Kopyalandı!"); }).catch(() => { fallbackCopy(text); });
        } else {
            fallbackCopy(text);
        }
    }

    function fallbackCopy(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed"; 
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try { document.execCommand('copy'); alert("Kopyalandı!"); } catch (err) { alert("Kopyalanamadı."); }
        document.body.removeChild(textArea);
    }
</script>

</body>
</html>
