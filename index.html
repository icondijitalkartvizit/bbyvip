<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güvenli Erişim</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 { color: #333; margin-bottom: 20px; }
        input[type="password"] {
            width: 85%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            text-align: center;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
            width: 90%;
        }
        button:hover { background-color: #0056b3; }
        .hidden-content { display: none; }
        .iban-box {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #495057;
            margin-top: 15px;
            word-break: break-all;
        }
        .error { color: #dc3545; margin-top: 10px; font-size: 14px; font-weight: bold; }
        .copy-btn { background-color: #28a745; margin-top: 15px; }
        .copy-btn:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-form">
        <h2>Güvenli Erişim</h2>
        <p style="color: #666; font-size: 14px;">Lütfen içeriği görüntülemek için şifreyi giriniz.</p>
        <input type="password" id="password" placeholder="Şifre">
        <br>
        <button onclick="verifyPassword()">Giriş Yap</button>
        <p id="error-msg" class="error"></p>
    </div>

    <div id="secure-content" class="hidden-content">
        <h2>Hesap Bilgileri</h2>
        <p><strong>Alıcı:</strong> <span id="recipient-text"></span></p>
        <div class="iban-box" id="iban-text"></div>
        <button class="copy-btn" onclick="copyIban()">IBAN Kopyala</button>
    </div>
</div>

<script>
    // "1234" şifresinin SHA-256 hash'i
    const targetHash = "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4";

    // Kriptolanmış veriler (Kodun içinde düz metin olarak görünmezler)
    // Şifre doğru girildiğinde bu karmaşık yapılar çözülecektir.
    const encryptedData = {
        name: [16, 58, 62, 55, 30, 84, 11, 47, 50, 59, 19, 81], 
        iban: [38, 36, 11, 14, 82, 11, 14, 11, 14, 82, 11, 14, 11, 14, 82, 11, 14, 11, 14, 82, 11, 14, 11, 14, 82, 11, 14, 11, 14, 82, 11, 14, 11, 14]
    };

    // Şifreyi hash'leyen fonksiyon
    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // XOR Algoritması ile veriyi şifre çözme işlemi
    function decrypt(encodedArray, key) {
        let result = '';
        for (let i = 0; i < encodedArray.length; i++) {
            result += String.fromCharCode(encodedArray[i] ^ key.charCodeAt(i % key.length));
        }
        return result;
    }

    // Şifre Doğrulama ve İçeriği Çözme
    async function verifyPassword() {
        const input = document.getElementById('password').value;
        const inputHash = await hashPassword(input);
        
        if (inputHash === targetHash) {
            // Şifre doğruysa, girilen şifre 'anahtar' olarak kullanılır ve veriler çözülür
            const decryptedName = decrypt(encryptedData.name, input);
            const decryptedIban = decrypt(encryptedData.iban, input);

            document.getElementById('recipient-text').innerText = decryptedName;
            document.getElementById('iban-text').innerText = decryptedIban;

            document.getElementById('login-form').style.display = 'none';
            document.getElementById('secure-content').style.display = 'block';
        } else {
            document.getElementById('error-msg').innerText = "Hatalı şifre girdiniz!";
        }
    }

    // Kopyalama fonksiyonu
    function copyIban() {
        const iban = document.getElementById('iban-text').innerText;
        navigator.clipboard.writeText(iban).then(() => {
            alert("IBAN panoya kopyalandı!");
        });
    }
</script>

</body>
</html>
